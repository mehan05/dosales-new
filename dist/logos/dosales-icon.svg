<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- DoSales Icon: Geometric "D" with signal pulse motif -->
  <!-- The D shape is formed by a bold vertical bar + three concentric signal arcs -->
  <!-- Signals forward motion, data intelligence, and the "D" in DoSales -->

  <!-- Vertical bar of the "D" -->
  <rect x="8" y="8" width="6" height="32" rx="3" fill="#0F172A"/>

  <!-- Signal arcs emanating from the bar - representing data/intelligence signals -->
  <path d="M18 12 C30 12, 38 18, 38 24 C38 30, 30 36, 18 36" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M18 18 C26 18, 32 21, 32 24 C32 27, 26 30, 18 30" stroke="#0EA5E9" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M18 23 C22 23, 26 23.5, 26 24 C26 24.5, 22 25, 18 25" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
